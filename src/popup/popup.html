<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Popup Player</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px;
        width: 330px;
      }
      h2 {
        margin: 0 0 8px;
        font-size: 1rem;
      }
      .row {
        margin-bottom: 10px;
      }
      label {
        font-size: 0.9rem;
      }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
      }
      #status {
        min-height: 1.2rem;
        color: #1a73e8;
        font-size: 0.85rem;
      }
      ul {
        margin: 8px 0 0;
        padding-left: 16px;
        max-height: 130px;
        overflow: auto;
      }
      li {
        font-size: 0.8rem;
        word-break: break-all;
      }
      .muted {
        color: #666;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <h2>Video Popup Player</h2>
    <div class="row">
      <label>
        <input id="enabled" type="checkbox">
        Enable direct video link interception
      </label>
    </div>
    <div class="row">
      <label for="extInput">Allowed extensions (comma-separated)</label>
      <input id="extInput" type="text" placeholder="mkv,mp4,webm,mov">
    </div>
    <div class="row">
      <button id="saveBtn" type="button">Save Settings</button>
    </div>
    <div id="status"></div>
    <div class="row">
      <strong>Recent intercepted links</strong>
      <div class="muted">Most recent first</div>
      <ul id="recentList"></ul>
    </div>
    <script src="./popup.js"></script>
  </body>
</html>
